name: Dry Run Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create demo .env
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          FUSION_BASE_URL=https://dummy.fa.us2.oraclecloud.com
          FUSION_USERNAME=demo.user@example.com
          FUSION_PASSWORD=testpassword
          FUSION_REST_VERSION=11.13.18.05
          FUSION_CURRENCY=USD
          DRY_RUN=true
          EOF

      - name: Run agent demo
        run: python main.py --pdf quotes/sample_supplier_quote.pdf
